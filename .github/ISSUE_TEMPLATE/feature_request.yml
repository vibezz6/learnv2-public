name: Feature request
description: Suggest a scoped improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What learner or maintainer problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: Scope check
      options:
        - label: This keeps Learn v2 local-first.
        - label: This does not require accounts or a backend.
        - label: This does not include private/user data.
